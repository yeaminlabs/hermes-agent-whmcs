# ═══════════════════════════════════════════════════════════════
#  LiteLLM Gateway — SNBD Host (AWS Bedrock Backend)
#  Customers: OPENAI_API_BASE=http://46.62.205.66:4000/v1
#  Keys stay HERE, never on customer VPS.
